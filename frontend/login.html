<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trello Manager — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #d4d4d8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #e4e4e7;
      border: 1px solid #a1a1aa;
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.15);
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #09090b;
      text-align: center;
      margin-bottom: 8px;
    }
    .subtitle {
      text-align: center;
      color: #71717a;
      font-size: 0.875rem;
      margin-bottom: 32px;
    }
    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      color: #3f3f46;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #a1a1aa;
      border-radius: 8px;
      background: #f4f4f5;
      color: #09090b;
      font-size: 0.9rem;
      margin-bottom: 20px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #09090b; }
    button {
      width: 100%;
      padding: 11px;
      background: #09090b;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .error {
      background: #fef2f2;
      border: 1px solid #fca5a5;
      color: #b91c1c;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.875rem;
      margin-bottom: 16px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Trello Manager</h1>
    <p class="subtitle">Entre com sua conta</p>
    <div class="error" id="error"></div>
    <form id="form">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="seu@email.com" required autocomplete="email">
      <label for="password">Senha</label>
      <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
      <button type="submit" id="btn">Entrar</button>
    </form>
  </div>

  <script>
    if (localStorage.getItem('tm_token')) {
      window.location.href = '/index.html';
    }

    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn');
      const errEl = document.getElementById('error');
      errEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Entrando...';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Erro ao fazer login');
        localStorage.setItem('tm_token', data.token);
        localStorage.setItem('tm_user', JSON.stringify(data.user));
        window.location.href = '/index.html';
      } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    });
  </script>
</body>
</html>
