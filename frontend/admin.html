<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trello Manager — Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #d4d4d8;
      min-height: 100vh;
      color: #09090b;
    }
    header {
      background: #09090b;
      color: #fff;
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 1.1rem; font-weight: 700; }
    header nav { display: flex; gap: 16px; align-items: center; }
    header a {
      color: #a1a1aa;
      text-decoration: none;
      font-size: 0.875rem;
      transition: color 0.15s;
    }
    header a:hover { color: #fff; }
    header a.active { color: #fff; font-weight: 600; }
    .logout-btn {
      background: transparent;
      border: 1px solid #3f3f46;
      color: #a1a1aa;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.15s;
    }
    .logout-btn:hover { border-color: #a1a1aa; color: #fff; }
    .container { max-width: 900px; margin: 32px auto; padding: 0 24px; }
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .section-header h2 { font-size: 1.2rem; font-weight: 700; }
    .btn {
      background: #09090b;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 9px 18px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.8; }
    .btn-sm {
      padding: 5px 12px;
      font-size: 0.8rem;
      border-radius: 6px;
    }
    .btn-danger { background: #b91c1c; }
    .btn-secondary { background: #3f3f46; }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #e4e4e7;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #a1a1aa;
    }
    th {
      background: #27272a;
      color: #e4e4e7;
      text-align: left;
      padding: 12px 16px;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    td {
      padding: 12px 16px;
      border-top: 1px solid #d4d4d8;
      font-size: 0.875rem;
      vertical-align: middle;
    }
    tr:hover td { background: #f4f4f5; }
    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .badge-admin { background: #09090b; color: #fff; }
    .badge-user { background: #d4d4d8; color: #3f3f46; }
    .actions { display: flex; gap: 8px; }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #e4e4e7;
      border: 1px solid #a1a1aa;
      border-radius: 12px;
      padding: 32px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.3);
    }
    .modal h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 24px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #3f3f46;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .form-group input, .form-group select {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #a1a1aa;
      border-radius: 8px;
      background: #f4f4f5;
      color: #09090b;
      font-size: 0.875rem;
      outline: none;
    }
    .form-group input:focus, .form-group select:focus { border-color: #09090b; }
    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 8px;
    }
    .error-msg {
      background: #fef2f2;
      border: 1px solid #fca5a5;
      color: #b91c1c;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 0.8rem;
      margin-bottom: 16px;
      display: none;
    }
    .loading { text-align: center; padding: 32px; color: #71717a; }
    .hint { font-size: 0.75rem; color: #71717a; margin-top: 3px; }
  </style>
</head>
<body>
  <header>
    <h1>Trello Manager</h1>
    <nav>
      <a href="/index.html">Criar Cards</a>
      <a href="/admin.html" class="active">Usuários</a>
      <button class="logout-btn" onclick="logout()">Sair</button>
    </nav>
  </header>

  <div class="container">
    <div class="section-header">
      <h2>Gerenciar Usuários</h2>
      <button class="btn" onclick="openModal()">+ Novo Usuário</button>
    </div>
    <div id="tableWrapper"><p class="loading">Carregando...</p></div>
  </div>

  <!-- Modal criar/editar -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h3 id="modalTitle">Novo Usuário</h3>
      <div class="error-msg" id="modalError"></div>
      <div class="form-row">
        <div class="form-group">
          <label>Nome</label>
          <input type="text" id="fName" placeholder="Nome completo">
        </div>
        <div class="form-group">
          <label>Perfil</label>
          <select id="fRole">
            <option value="user">Usuário</option>
            <option value="admin">Admin</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="fEmail" placeholder="email@exemplo.com">
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" id="fPassword" placeholder="Deixe em branco para manter">
        <p class="hint" id="passwordHint" style="display:none">Deixe em branco para não alterar</p>
      </div>
      <div class="form-group">
        <label>Trello API Key</label>
        <input type="text" id="fApiKey" placeholder="API Key do Trello">
      </div>
      <div class="form-group">
        <label>Trello Token</label>
        <input type="text" id="fToken" placeholder="Token do Trello">
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
        <button class="btn" id="saveBtn" onclick="saveUser()">Salvar</button>
      </div>
    </div>
  </div>

  <script>
    let token = localStorage.getItem('tm_token');
    let editingId = null;

    (function checkAuth() {
      if (!token) return (window.location.href = '/login.html');
      const user = JSON.parse(localStorage.getItem('tm_user') || '{}');
      if (user.role !== 'admin') return (window.location.href = '/index.html');
    })();

    function logout() {
      localStorage.removeItem('tm_token');
      localStorage.removeItem('tm_user');
      window.location.href = '/login.html';
    }

    function authHeaders() {
      return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` };
    }

    let usersCache = [];

    async function loadUsers() {
      const res = await fetch('/api/auth/users', { headers: authHeaders() });
      if (res.status === 401) return logout();
      usersCache = await res.json();
      renderTable(usersCache);
    }

    function renderTable(users) {
      if (!users.length) {
        document.getElementById('tableWrapper').innerHTML = '<p class="loading">Nenhum usuário cadastrado.</p>';
        return;
      }
      const rows = users.map((u, i) => `
        <tr>
          <td>${u.name}</td>
          <td>${u.email}</td>
          <td><span class="badge badge-${u.role}">${u.role}</span></td>
          <td>${u.google_email ? `<span style="color:#15803d;font-size:0.78rem">✓ ${u.google_email}</span>` : '<span style="color:#71717a;font-size:0.78rem">—</span>'}</td>
          <td>${new Date(u.created_at).toLocaleDateString('pt-BR')}</td>
          <td>
            <div class="actions">
              <button class="btn btn-secondary btn-sm" onclick="openModal(${i})">Editar</button>
              <button class="btn btn-danger btn-sm" onclick="deleteUser('${u.id}','${esc(u.name)}')">Excluir</button>
            </div>
          </td>
        </tr>`).join('');
      document.getElementById('tableWrapper').innerHTML = `
        <table>
          <thead><tr><th>Nome</th><th>Email</th><th>Perfil</th><th>Google Drive</th><th>Criado em</th><th>Ações</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    function esc(s) { return s.replace(/'/g, "\\'"); }

    function openModal(idx) {
      const u = idx !== undefined ? usersCache[idx] : null;
      editingId = u ? u.id : null;
      document.getElementById('modalTitle').textContent = u ? 'Editar Usuário' : 'Novo Usuário';
      document.getElementById('fName').value = u ? u.name : '';
      document.getElementById('fEmail').value = u ? u.email : '';
      document.getElementById('fRole').value = u ? u.role : 'user';
      document.getElementById('fPassword').value = '';
      document.getElementById('fApiKey').value = u ? (u.trello_api_key || '') : '';
      document.getElementById('fToken').value = u ? (u.trello_token || '') : '';
      document.getElementById('passwordHint').style.display = u ? 'block' : 'none';
      document.getElementById('modalError').style.display = 'none';
      document.getElementById('modalOverlay').classList.add('open');
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('open');
      editingId = null;
    }

    async function saveUser() {
      const errEl = document.getElementById('modalError');
      const saveBtn = document.getElementById('saveBtn');
      errEl.style.display = 'none';
      saveBtn.disabled = true;

      const apiKey = document.getElementById('fApiKey').value.trim();
      const trelloToken = document.getElementById('fToken').value.trim();
      const body = {
        name: document.getElementById('fName').value.trim(),
        email: document.getElementById('fEmail').value.trim(),
        role: document.getElementById('fRole').value,
      };
      if (apiKey) body.trello_api_key = apiKey;
      if (trelloToken) body.trello_token = trelloToken;
      const pass = document.getElementById('fPassword').value;
      if (pass) body.password = pass;
      if (!editingId && !pass) {
        errEl.textContent = 'Senha é obrigatória para novo usuário';
        errEl.style.display = 'block';
        saveBtn.disabled = false;
        return;
      }

      try {
        const url = editingId ? `/api/auth/users/${editingId}` : '/api/auth/users';
        const method = editingId ? 'PUT' : 'POST';
        const res = await fetch(url, { method, headers: authHeaders(), body: JSON.stringify(body) });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Erro ao salvar');
        closeModal();
        loadUsers();
      } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = 'block';
      } finally {
        saveBtn.disabled = false;
      }
    }

    async function deleteUser(id, name) {
      if (!confirm(`Excluir usuário "${name}"?`)) return;
      const res = await fetch(`/api/auth/users/${id}`, { method: 'DELETE', headers: authHeaders() });
      if (res.ok) loadUsers();
      else alert('Erro ao excluir usuário');
    }

    document.getElementById('modalOverlay').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeModal();
    });

    loadUsers();
  </script>
</body>
</html>
