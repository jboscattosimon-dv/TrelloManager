<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trello Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #d4d4d8;
      min-height: 100vh;
      color: #09090b;
    }
    header {
      background: #09090b;
      color: #fff;
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 1.1rem; font-weight: 700; }
    header nav { display: flex; gap: 16px; align-items: center; }
    .nav-link {
      color: #a1a1aa;
      text-decoration: none;
      font-size: 0.875rem;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      transition: color 0.15s;
    }
    .nav-link:hover { color: #fff; }
    .nav-link.active { color: #fff; font-weight: 600; }
    .logout-btn {
      background: transparent;
      border: 1px solid #3f3f46;
      color: #a1a1aa;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.15s;
    }
    .logout-btn:hover { border-color: #a1a1aa; color: #fff; }
    .tabs {
      display: flex;
      gap: 4px;
      padding: 20px 24px 0;
      max-width: 1100px;
      margin: 0 auto;
    }
    .tab {
      padding: 9px 20px;
      border-radius: 8px 8px 0 0;
      background: #c4c4c8;
      border: 1px solid #a1a1aa;
      border-bottom: none;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      color: #3f3f46;
      transition: all 0.15s;
    }
    .tab.active {
      background: #e4e4e7;
      color: #09090b;
      font-weight: 700;
    }
    .main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 24px 40px;
    }
    .panel {
      display: none;
      background: #e4e4e7;
      border: 1px solid #a1a1aa;
      border-radius: 0 12px 12px 12px;
      padding: 28px;
    }
    .panel.active { display: block; }
    .form-group { margin-bottom: 18px; }
    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #3f3f46;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    input[type="text"], input[type="date"], select, textarea {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #a1a1aa;
      border-radius: 8px;
      background: #f4f4f5;
      color: #09090b;
      font-size: 0.875rem;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus, select:focus, textarea:focus { border-color: #09090b; }
    textarea { resize: vertical; font-family: inherit; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
    .btn {
      background: #09090b;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 22px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.8; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-secondary { background: #3f3f46; }
    .btn-sm { padding: 5px 12px; font-size: 0.8rem; border-radius: 6px; }
    .btn-danger { background: #b91c1c; }

    /* Log output */
    #log, #logSubir {
      margin-top: 20px;
      background: #18181b;
      color: #a1a1aa;
      border-radius: 8px;
      padding: 16px;
      font-size: 0.8rem;
      font-family: monospace;
      max-height: 320px;
      overflow-y: auto;
      line-height: 1.6;
      display: none;
    }
    .log-ok { color: #4ade80; }
    .log-err { color: #f87171; }
    .log-info { color: #60a5fa; }

    /* Config table */
    .config-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    .config-table th {
      background: #27272a;
      color: #e4e4e7;
      text-align: left;
      padding: 10px 12px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .config-table td {
      padding: 8px 12px;
      border-top: 1px solid #d4d4d8;
      vertical-align: middle;
    }
    .config-table tr:hover td { background: #f4f4f5; }
    .config-table input[type="text"] {
      padding: 5px 8px;
      font-size: 0.82rem;
      margin: 0;
    }
    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .badge-ativo { background: #dcfce7; color: #15803d; }
    .badge-inativo { background: #f4f4f5; color: #71717a; }

    .filter-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      align-items: center;
    }
    .filter-btn {
      padding: 6px 16px;
      border-radius: 20px;
      border: 1px solid #a1a1aa;
      background: #f4f4f5;
      color: #3f3f46;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-btn.active { background: #09090b; color: #fff; border-color: #09090b; }

    .info-box {
      background: #f0f9ff;
      border: 1px solid #7dd3fc;
      color: #0369a1;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.8rem;
      margin-bottom: 16px;
    }
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .section-header h2 { font-size: 1.1rem; font-weight: 700; }

    /* progress bar */
    .progress-bar-wrap {
      background: #d4d4d8;
      border-radius: 999px;
      height: 6px;
      margin-top: 12px;
      display: none;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: #09090b;
      border-radius: 999px;
      transition: width 0.3s;
      width: 0%;
    }
  </style>
</head>
<body>
  <header>
    <h1>Trello Manager</h1>
    <nav>
      <button class="nav-link active" onclick="showTab('criar')">Criar Cards</button>
      <button class="nav-link" onclick="showTab('subir')">Subir Conteúdo</button>
      <button class="nav-link" onclick="showTab('config')">Configurações</button>
      <a href="/admin.html" id="adminLink" class="nav-link" style="display:none">Usuários</a>
      <button class="logout-btn" onclick="logout()">Sair</button>
    </nav>
  </header>

  <div class="tabs">
    <div class="tab active" id="tab-criar" onclick="showTab('criar')">Criar Cards</div>
    <div class="tab" id="tab-subir" onclick="showTab('subir')">Subir Conteúdo</div>
    <div class="tab" id="tab-config" onclick="showTab('config')">Configurações</div>
  </div>

  <div class="main">
    <!-- TAB: Criar Cards -->
    <div class="panel active" id="panel-criar">
      <div class="row" style="margin-bottom:18px">
        <div class="form-group" style="margin:0">
          <label>Data início</label>
          <input type="date" id="dataInicio">
        </div>
        <div class="form-group" style="margin:0">
          <label>Data fim</label>
          <input type="date" id="dataFim">
        </div>
      </div>
      <div class="form-group">
        <label>Clientes ativos (selecione para criar cards)</label>
        <div id="clienteCheckboxes" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:4px"></div>
      </div>
      <button class="btn" id="btnCriar" onclick="criarCards()">Criar Cards</button>
      <div class="progress-bar-wrap" id="progressWrap">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div id="log"></div>
    </div>

    <!-- TAB: Subir Conteúdo -->
    <div class="panel" id="panel-subir">
      <div class="form-group">
        <label>Cliente</label>
        <select id="clienteSubir">
          <option value="">Selecione um cliente...</option>
        </select>
      </div>
      <div class="form-group">
        <label>Conteúdo (cole aqui com as datas)</label>
        <textarea id="conteudo" rows="14" placeholder="Cole aqui o conteúdo com datas no formato:&#10;SEGUNDA-FEIRA — 18 de maio&#10;Texto do card...&#10;&#10;TERÇA-FEIRA — 19/05&#10;Texto..."></textarea>
      </div>
      <button class="btn" id="btnSubir" onclick="subirConteudo()">Subir Conteúdo</button>
      <div class="progress-bar-wrap" id="progressWrapSubir">
        <div class="progress-bar" id="progressBarSubir"></div>
      </div>
      <div id="logSubir"></div>
    </div>

    <!-- TAB: Configurações -->
    <div class="panel" id="panel-config">
      <div class="section-header">
        <h2>Clientes (Boards do Trello)</h2>
        <button class="btn btn-secondary btn-sm" id="btnSyncBoards" onclick="sincronizarBoards()">↻ Sincronizar Boards</button>
      </div>
      <div class="filter-row">
        <button class="filter-btn active" id="filtroAtivos" onclick="setFiltro('ativos')">Ativos</button>
        <button class="filter-btn" id="filtroInativos" onclick="setFiltro('inativos')">Inativos</button>
      </div>
      <div id="configTable"><p style="color:#71717a;font-size:0.85rem">Carregando boards...</p></div>
      <div style="margin-top:16px">
        <button class="btn" onclick="salvarConfig()">Salvar Configurações</button>
      </div>
    </div>
  </div>

  <script>
    // ── Auth ──────────────────────────────────────────────
    const token = localStorage.getItem('tm_token');
    const tmUser = JSON.parse(localStorage.getItem('tm_user') || '{}');
    let trelloKey = '', trelloToken = '';

    (async function init() {
      if (!token) return (window.location.href = '/login.html');
      try {
        const payload = JSON.parse(atob(token.split('.')[1]));
        trelloKey = payload.trello_api_key || '';
        trelloToken = payload.trello_token || '';
      } catch { logout(); }
      if (tmUser.role === 'admin') document.getElementById('adminLink').style.display = '';
      await sincronizarBoards();
      renderClienteCheckboxes();
      populateClienteSubir();
    })();

    function logout() {
      localStorage.removeItem('tm_token');
      localStorage.removeItem('tm_user');
      window.location.href = '/login.html';
    }

    // ── Tabs ──────────────────────────────────────────────
    function showTab(name) {
      ['criar','subir','config'].forEach(t => {
        document.getElementById(`panel-${t}`).classList.toggle('active', t === name);
        document.getElementById(`tab-${t}`).classList.toggle('active', t === name);
      });
      document.querySelectorAll('header .nav-link').forEach(el => {
        el.classList.toggle('active', el.getAttribute('onclick') === `showTab('${name}')`);
      });
      if (name === 'config') renderConfig();
    }

    // ── Storage ───────────────────────────────────────────
    const STORAGE_KEY = 'tm_clientes_v3';

    function loadClientes() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
      catch { return []; }
    }
    function saveClientes(cs) { localStorage.setItem(STORAGE_KEY, JSON.stringify(cs)); }
    let clientes = loadClientes();

    // ── Trello helpers ────────────────────────────────────
    const TRELLO = 'https://api.trello.com/1';

    async function tFetch(path) {
      const sep = path.includes('?') ? '&' : '?';
      const res = await fetch(`${TRELLO}${path}${sep}key=${trelloKey}&token=${trelloToken}`);
      if (!res.ok) throw new Error(`Trello ${res.status}: ${path}`);
      return res.json();
    }

    async function fetchListas(boardId) {
      if (!boardId) return [];
      return tFetch(`/boards/${boardId}/lists?filter=open`);
    }

    async function sincronizarBoards() {
      const btn = document.getElementById('btnSyncBoards');
      btn.disabled = true;
      btn.textContent = 'Sincronizando...';
      document.getElementById('configTable').innerHTML = '<p style="color:#71717a;font-size:0.85rem">Buscando boards...</p>';
      try {
        const boards = await tFetch('/members/me/boards?filter=open&fields=id,name');
        for (const b of boards) {
          const existing = clientes.find(c => c.boardId === b.id);
          if (!existing) {
            const listas = await fetchListas(b.id);
            clientes.push({ nome: b.name, boardId: b.id, listIds: [], diasSemana: [1,2,3,4,5], ativo: true, listas });
          } else if (!existing.listas || !existing.listas.length) {
            existing.listas = await fetchListas(b.id);
          }
        }
        saveClientes(clientes);
        renderClienteCheckboxes();
        populateClienteSubir();
      } catch (err) {
        document.getElementById('configTable').innerHTML = `<p style="color:#b91c1c;font-size:0.85rem">Erro ao buscar boards: ${err.message}</p>`;
      }
      btn.disabled = false;
      btn.textContent = '↻ Sincronizar Boards';
      renderConfig();
    }

    async function criarCard(listId, name, desc) {
      const body = new URLSearchParams({ idList: listId, name, desc, key: trelloKey, token: trelloToken });
      const res = await fetch(`${TRELLO}/cards`, { method: 'POST', body });
      if (!res.ok) throw new Error(`Erro ao criar card: ${res.status}`);
      return res.json();
    }

    async function atualizarCard(cardId, desc) {
      const body = new URLSearchParams({ desc, key: trelloKey, token: trelloToken });
      const res = await fetch(`${TRELLO}/cards/${cardId}`, { method: 'PUT', body });
      if (!res.ok) throw new Error(`Erro ao atualizar card: ${res.status}`);
    }

    async function buscarCard(listId, name) {
      const cards = await tFetch(`/lists/${listId}/cards`);
      return cards.find(c => c.name === name) || null;
    }

    // ── Date helpers ──────────────────────────────────────
    const DIAS_NOME = ['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'];
    const MESES_ABREV = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];

    function formatarTitulo(date) {
      const dia = String(date.getDate()).padStart(2,'0');
      const mes = String(date.getMonth()+1).padStart(2,'0');
      const nomeDia = DIAS_NOME[date.getDay()];
      return `${dia}/${mes} - ${nomeDia}`;
    }

    function diasNoRange(inicio, fim, diasSemana) {
      const dias = [];
      const cur = new Date(inicio + 'T12:00:00');
      const end = new Date(fim + 'T12:00:00');
      while (cur <= end) {
        if (diasSemana.includes(cur.getDay())) dias.push(new Date(cur));
        cur.setDate(cur.getDate() + 1);
      }
      return dias;
    }

    // ── Log helpers ───────────────────────────────────────
    function logMsg(el, msg, cls = '') {
      el.style.display = 'block';
      el.innerHTML += `<div${cls ? ` class="${cls}"` : ''}>${msg}</div>`;
      el.scrollTop = el.scrollHeight;
    }

    // ── Criar Cards ───────────────────────────────────────
    function getListIds(c) {
      if (c.listIds && c.listIds.length) return c.listIds;
      if (c.listId) return [c.listId]; // compat legado
      return [];
    }

    function renderClienteCheckboxes() {
      const comLista = clientes.filter(c => c.ativo && getListIds(c).length > 0);
      document.getElementById('clienteCheckboxes').innerHTML = comLista.length
        ? comLista.map(c => `
            <label style="display:flex;align-items:center;gap:6px;background:#f4f4f5;border:1px solid #a1a1aa;border-radius:6px;padding:5px 12px;cursor:pointer;font-size:0.85rem;font-weight:500;">
              <input type="checkbox" checked data-idx="${clientes.indexOf(c)}" style="width:auto;margin:0;padding:0;"> ${c.nome}
            </label>`).join('')
        : '<p style="color:#71717a;font-size:0.85rem">Nenhum cliente ativo com lista configurada.</p>';
    }

    async function criarCards() {
      const inicio = document.getElementById('dataInicio').value;
      const fim = document.getElementById('dataFim').value;
      if (!inicio || !fim) return alert('Selecione as datas');

      const selecionados = [...document.querySelectorAll('#clienteCheckboxes input:checked')]
        .map(cb => clientes[+cb.dataset.idx]).filter(Boolean);
      if (!selecionados.length) return alert('Selecione ao menos um cliente');

      const logEl = document.getElementById('log');
      logEl.innerHTML = '';
      logEl.style.display = 'block';
      const btn = document.getElementById('btnCriar');
      btn.disabled = true;

      const progressWrap = document.getElementById('progressWrap');
      const progressBar = document.getElementById('progressBar');
      progressWrap.style.display = 'block';
      progressBar.style.width = '0%';

      let total = 0, done = 0;
      selecionados.forEach(c => total += diasNoRange(inicio, fim, c.diasSemana).length * getListIds(c).length);

      for (const c of selecionados) {
        const listIds = getListIds(c);
        const dias = diasNoRange(inicio, fim, c.diasSemana);
        logMsg(logEl, `<br>── ${c.nome} (${dias.length} cards × ${listIds.length} lista${listIds.length>1?'s':''}) ──`, 'log-info');
        for (const listId of listIds) {
          const nomeLista = (c.listas||[]).find(l => l.id === listId)?.name || listId;
          logMsg(logEl, `  → ${nomeLista}`, 'log-info');
          for (const d of dias) {
            const titulo = formatarTitulo(d);
            try {
              const existing = await buscarCard(listId, titulo);
              if (existing) {
                logMsg(logEl, `    ↷ ${titulo} — já existe`);
              } else {
                await criarCard(listId, titulo, '');
                logMsg(logEl, `    ✓ ${titulo}`, 'log-ok');
              }
            } catch (err) {
              logMsg(logEl, `    ✗ ${titulo}: ${err.message}`, 'log-err');
            }
            done++;
            progressBar.style.width = `${Math.round(done/total*100)}%`;
            await new Promise(r => setTimeout(r, 150));
          }
        }
      }
      logMsg(logEl, '<br>Concluído!', 'log-ok');
      btn.disabled = false;
    }

    // ── Subir Conteúdo ────────────────────────────────────
    function populateClienteSubir() {
      const sel = document.getElementById('clienteSubir');
      sel.innerHTML = '<option value="">Selecione cliente / lista...</option>';
      clientes.filter(c => c.ativo).forEach(c => {
        const ids = getListIds(c);
        if (!ids.length) return;
        const gi = clientes.indexOf(c);
        ids.forEach(lid => {
          const nomeLista = (c.listas||[]).find(l => l.id === lid)?.name || lid;
          sel.innerHTML += `<option value="${gi}|${lid}">${c.nome} — ${nomeLista}</option>`;
        });
      });
    }
    const MESES_MAP = {
      janeiro:'01',fevereiro:'02','março':'03',marco:'03',abril:'04',
      maio:'05',junho:'06',julho:'07',agosto:'08',setembro:'09',
      outubro:'10',novembro:'11',dezembro:'12',
      jan:'01',fev:'02',mar:'03',abr:'04',mai:'05',jun:'06',
      jul:'07',ago:'08',set:'09',out:'10',nov:'11',dez:'12'
    };
    const DIA_NOMES_RE = /SEGUNDA|TER[CÇ]A|QUARTA|QUINTA|SEXTA|S[AÁ]BADO|DOMINGO/i;

    function normStr(s) {
      return s.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');
    }

    function extrairData(linha) {
      if (!DIA_NOMES_RE.test(linha)) return null;
      // DD/MM
      const m1 = linha.match(/(\d{1,2})\/(\d{2})/);
      if (m1) return `${m1[1].padStart(2,'0')}/${m1[2]}`;
      // DD de MÊSNAME ou DD MÊSNAME
      const m2 = linha.match(/(\d{1,2})\s+(?:de\s+)?([a-záàâãéèêíïóôõöúüç]+)/i);
      if (m2) {
        const mesNorm = normStr(m2[2]);
        const mm = MESES_MAP[mesNorm];
        if (mm) return `${m2[1].padStart(2,'0')}/${mm}`;
      }
      return null;
    }

    function parsearConteudo(texto) {
      const linhas = texto.split('\n');
      const blocos = [];
      let atual = null;
      for (const linha of linhas) {
        const data = extrairData(linha.trim());
        if (data) {
          if (atual) blocos.push(atual);
          atual = { data, titulo: linha.trim(), linhas: [] };
        } else if (atual) {
          atual.linhas.push(linha);
        }
      }
      if (atual) blocos.push(atual);
      return blocos.map(b => ({ data: b.data, titulo: b.titulo, desc: b.linhas.join('\n').trim() }));
    }

    async function subirConteudo() {
      const val = document.getElementById('clienteSubir').value;
      if (!val) return alert('Selecione um cliente');
      const [gi, listId] = val.split('|');
      const c = clientes[+gi];
      const texto = document.getElementById('conteudo').value.trim();
      if (!texto) return alert('Cole o conteúdo');

      const blocos = parsearConteudo(texto);
      if (!blocos.length) return alert('Nenhuma data encontrada no conteúdo. Use formatos como "SEGUNDA-FEIRA — 18 de maio" ou "SEGUNDA 18/05".');

      const logEl = document.getElementById('logSubir');
      logEl.innerHTML = '';
      logEl.style.display = 'block';
      const btn = document.getElementById('btnSubir');
      btn.disabled = true;

      const progressWrap = document.getElementById('progressWrapSubir');
      const progressBar = document.getElementById('progressBarSubir');
      progressWrap.style.display = 'block';
      progressBar.style.width = '0%';

      const nomeLista = (c.listas||[]).find(l => l.id === listId)?.name || listId;
      logMsg(logEl, `Enviando ${blocos.length} blocos para ${c.nome} — ${nomeLista}...`, 'log-info');

      for (let i = 0; i < blocos.length; i++) {
        const b = blocos[i];
        try {
          const cards = await tFetch(`/lists/${listId}/cards`);
          const card = cards.find(card => card.name.startsWith(b.data));
          if (!card) {
            logMsg(logEl, `  ⚠ ${b.data}: card não encontrado na lista`, 'log-err');
          } else {
            await atualizarCard(card.id, b.desc);
            logMsg(logEl, `  ✓ ${card.name}`, 'log-ok');
          }
        } catch (err) {
          logMsg(logEl, `  ✗ ${b.data}: ${err.message}`, 'log-err');
        }
        progressBar.style.width = `${Math.round((i+1)/blocos.length*100)}%`;
        await new Promise(r => setTimeout(r, 200));
      }
      logMsg(logEl, '<br>Concluído!', 'log-ok');
      btn.disabled = false;
    }

    // ── Configurações ─────────────────────────────────────
    let filtroAtual = 'ativos';

    function setFiltro(f) {
      filtroAtual = f;
      document.getElementById('filtroAtivos').classList.toggle('active', f === 'ativos');
      document.getElementById('filtroInativos').classList.toggle('active', f === 'inativos');
      renderConfig();
    }

    const DIAS_LABELS = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

    function renderConfig() {
      const lista = clientes.filter(c => filtroAtual === 'ativos' ? c.ativo : !c.ativo);
      if (!lista.length) {
        document.getElementById('configTable').innerHTML = `<p style="color:#71717a;font-size:0.85rem">Nenhum cliente ${filtroAtual}.</p>`;
        return;
      }
      const rows = lista.map(c => {
        const gi = clientes.indexOf(c);
        const ids = getListIds(c);
        const optsListas = (c.listas || []).map(l =>
          `<option value="${l.id}" ${ids.includes(l.id)?'selected':''}>${l.name}</option>`).join('');
        const diasCheck = [1,2,3,4,5,6,0].map(d => `
          <label style="display:flex;align-items:center;gap:3px;font-size:0.78rem;cursor:pointer">
            <input type="checkbox" ${(c.diasSemana||[1,2,3,4,5]).includes(d)?'checked':''}
              onchange="toggleDia(${gi},${d},this.checked)" style="width:auto;margin:0;padding:0">
            ${DIAS_LABELS[d]}
          </label>`).join('');
        const nListas = (c.listas||[]).length;
        return `
          <tr>
            <td style="font-weight:600">${c.nome}</td>
            <td>
              <div style="display:flex;gap:6px;align-items:flex-start">
                ${nListas
                  ? `<select multiple onchange="setListIds(${gi},this)" style="min-width:160px;height:${Math.min(nListas,5)*28}px">${optsListas}</select>`
                  : `<span style="color:#71717a;font-size:0.78rem">Clique em ↻</span>`}
                <button class="btn btn-secondary btn-sm" onclick="fetchListasCliente(${gi})">↻</button>
              </div>
            </td>
            <td><div style="display:flex;gap:8px;flex-wrap:wrap">${diasCheck}</div></td>
            <td>
              <div style="display:flex;gap:6px">
                <span class="badge ${c.ativo?'badge-ativo':'badge-inativo'}">${c.ativo?'Ativo':'Inativo'}</span>
                <button class="btn btn-sm ${c.ativo?'btn-secondary':'btn'}" onclick="toggleAtivo(${gi})">${c.ativo?'Desativar':'Ativar'}</button>
              </div>
            </td>
          </tr>`;
      }).join('');

      document.getElementById('configTable').innerHTML = `
        <table class="config-table">
          <thead><tr>
            <th>Board (Cliente)</th><th>Lista</th><th>Dias da semana</th><th>Status</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    function setListIds(gi, sel) {
      clientes[gi].listIds = [...sel.selectedOptions].map(o => o.value);
    }

    function toggleDia(gi, dia, checked) {
      const ds = clientes[gi].diasSemana || [];
      if (checked && !ds.includes(dia)) ds.push(dia);
      if (!checked) clientes[gi].diasSemana = ds.filter(d => d !== dia);
      else clientes[gi].diasSemana = ds;
    }

    function toggleAtivo(gi) {
      clientes[gi].ativo = !clientes[gi].ativo;
      renderConfig();
      renderClienteCheckboxes();
      populateClienteSubir();
    }

    async function fetchListasCliente(gi) {
      try {
        clientes[gi].listas = await fetchListas(clientes[gi].boardId);
        renderConfig();
      } catch { alert('Erro ao buscar listas. Verifique o Board ID.'); }
    }

    function salvarConfig() {
      saveClientes(clientes);
      renderClienteCheckboxes();
      populateClienteSubir();
      alert('Configurações salvas!');
    }
  </script>
</body>
</html>
